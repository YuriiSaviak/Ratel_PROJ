services:
  postgres:
    image: postgres:18.3
    container_name: ratel-mind
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ura123
      POSTGRES_DB: ratel_mind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
