# Database (use ENV in production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ratel_mind}
spring.datasource.username=${DB_USER:postgres}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.password=ura123

server.port=${PORT:8080}

# CORS (comma-separated list). Example:
# APP_CORS_ALLOWED_ORIGINS=http://localhost:5173,https://ratelmind.com
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
