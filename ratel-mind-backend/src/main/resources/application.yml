# Database (use ENV in production)
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ratel_mind}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:ura123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

# CORS (comma-separated list). Example:
# APP_CORS_ALLOWED_ORIGINS=http://localhost:5173,https://ratelmind.com
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}